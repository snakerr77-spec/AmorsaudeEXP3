<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Amor Saúde</title>

  <link rel="stylesheet" href="../css/login.css?v=20260526-login-city1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css?v=20260526-search-baby1" rel="stylesheet">
</head>
<body>

  <!-- FUNDO -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <!-- TOPO -->
  <header class="topbar">

    <div class="logo">
      <img src="../assets/images/logo_funcionarios.png" alt="Logo Amor Saúde">
    </div>

    <nav>
      <a href="#login">Início</a>
      <a href="#login">Benefícios</a>
      <a href="#login">Contato</a>
    </nav>

  </header>

  <!-- LOGIN -->
  <main class="login-container" id="login">

    <!-- TEXTO -->
    <section class="left-side">

      <div class="tag">
        <i class="fa-solid fa-heart-pulse"></i>
        ÁREA DO COLABORADOR
      </div>

      <h1>
        Bem-vindo ao<br>
        Amor Saúde
      </h1>

      <p>
        Entre na plataforma para acessar treinamentos,
        benefícios, agenda médica e informações importantes.
      </p>

      <div class="mini-boxes">
        <div>Benefícios</div>
        <div>Treinamentos</div>
        <div>Cursos</div>
      </div>

    </section>

    <!-- CARD -->
    <section class="right-side">

      <div class="floating-icon icon-1">
        <i class="fa-solid fa-user-doctor"></i>
      </div>

      <div class="floating-icon icon-2">
        <i class="fa-solid fa-heart"></i>
      </div>

      <form class="login-card" id="loginForm">


        <h2>Entrar</h2>

        <p class="subtitle">
          Faça login para continuar
        </p>


        <label>Unidade / Cidade</label>

        <div class="input-box city-login-box">
          <i class="fa-solid fa-location-dot"></i>
          <select id="loginCidadeSelect" data-city-select aria-label="Selecionar cidade da unidade">
            <option value="Embu das Artes">Embu das Artes</option>
            <option value="Itapeva">Itapeva</option>
            <option value="Tatui">Tatui</option>
            <option value="Cerquilho">Cerquilho</option>
          </select>
        </div>

        <p class="city-login-hint">
          Essa cidade será aplicada ao colaborador após o login.
        </p>

        <label>E-mail</label>

        <div class="input-box">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="Digite seu e-mail" required autocomplete="email">
        </div>

        <label>Senha</label>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>

          <input
            type="password"
            placeholder="Digite sua senha"
            id="password"
            required
            autocomplete="current-password"
          >

          <button
            type="button"
            id="togglePassword"
          >
            <i class="fa-solid fa-eye"></i>
          </button>

        </div>

        <div class="options">

          <label class="remember">
            <input type="checkbox">
            Lembrar acesso
          </label>

          <button type="button" class="forgot-password" id="forgotPassword">
            Esqueci minha senha
          </button>

        </div>

        <button class="login-btn" type="submit">
          Entrar
        </button>

        <div class="social-login" aria-label="Entrar usando conta social">
          <button class="google-icon-btn" type="button" id="googleLoginBtn" title="Entrar com Google" aria-label="Entrar com Google">
            <svg width="22" height="22" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c10 0 19-7.3 19-20 0-1.2-.1-2.3-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.1 26.8 36 24 36c-5.3 0-9.8-3.4-11.4-8.1L6.1 33C9.4 39.5 16.2 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.2-.1-2.3-.4-3.5z"/>
            </svg>
          </button>
        </div>

        <p class="auth-message" id="authMessage" aria-live="polite"></p>
      </form>

      <!-- MASCOTE -->
      <img
        src="../assets/images/mascote_hero.png"
        class="mascot">

      <!-- ORBITA -->
      <div class="orbit"></div>

      <!-- PLATAFORMA -->
      <div class="platform"></div>

    </section>

  </main>

<script type="module" src="../js/firebase-config.js?v=20260526-login-city1"></script>
<script src="../js/login.js?v=20260526-login-city1"></script>
</body>
</html>
